name: Sync HackTricks Knowledge Base (Full)

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  sync-hacktricks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Clone HackTricks (full, no blobs for images)
        run: |
          # --filter=blob:none: clone structure without file blobs first
          # then only checkout text files we need (auto-fetched on access)
          git clone --depth=1 --filter=blob:none \
            https://github.com/HackTricks-wiki/hacktricks upstream-ht

      - name: Sync all content into knowledge_base/hacktricks
        run: |
          mkdir -p knowledge_base/hacktricks
          rsync -av --update \
            --exclude="banners/" \
            --exclude="images/" \
            --exclude="files/" \
            upstream-ht/src/ knowledge_base/hacktricks/
          rm -rf upstream-ht

          cat > knowledge_base/hacktricks/SOURCE.md << 'EOF'
          # HackTricks Knowledge Base
          Source: https://github.com/HackTricks-wiki/hacktricks
          License: https://github.com/HackTricks-wiki/hacktricks/blob/master/LICENSE.md
          Sync: Full (excludes banners/, images/, files/)
          Auto-synced weekly via GitHub Actions.
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync full hacktricks knowledge base'
          branch: sync/hacktricks-kb
          delete-branch: true
          title: 'Auto-sync: HackTricks Knowledge Base (Full)'
          body: |
            ## Auto-sync: HackTricks Full Knowledge Base

            Synced all content from [HackTricks-wiki/hacktricks](https://github.com/HackTricks-wiki/hacktricks/tree/master/src).

            **Included directories (all text content):**
            - AI, binary-exploitation, blockchain, crypto
            - generic-hacking, generic-methodologies-and-resources
            - hardware-physical-access, linux-hardening, macos-hardening
            - mobile-pentesting, network-services-pentesting, pentesting-web
            - reversing, stego, todo, welcome, windows-hardening

            **Excluded (non-text assets):** banners/, images/, files/

            Sync mode: incremental (`--update`, existing custom files preserved).
                    labels: 'auto-sync,knowledge-base,hacktricks'
