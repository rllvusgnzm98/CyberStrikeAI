name: Sync HackTricks Knowledge Base

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  sync-hacktricks:
    runs-on: ubuntu-latest
    permissions:
     contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Sparse checkout HackTricks topics
        run: |
          git clone --depth=1 --filter=blob:none --sparse \
            https://github.com/HackTricks-wiki/hacktricks upstream-ht
          cd upstream-ht
          git sparse-checkout set \
            src/pentesting-web \
            src/network-services-pentesting \
            src/windows-hardening \
            src/linux-hardening \
            src/cloud-security \
            src/todo

      - name: Sync into knowledge_base/hacktricks
        run: |
          mkdir -p knowledge_base/hacktricks
                    rsync -av --update upstream-ht/src/ knowledge_base/hacktricks/
          rm -rf upstream-ht

          # Write attribution notice
          cat > knowledge_base/hacktricks/SOURCE.md << 'EOF'
          # HackTricks Knowledge Base

          Content in this directory is sourced from [HackTricks](https://github.com/HackTricks-wiki/hacktricks).

          - **License**: See [HackTricks License](https://github.com/HackTricks-wiki/hacktricks/blob/master/LICENSE.md)
          - **Source**: https://github.com/HackTricks-wiki/hacktricks
          - **Auto-synced**: Weekly via GitHub Actions
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync hacktricks knowledge base'
          branch: sync/hacktricks-kb
          delete-branch: true
          title: 'Auto-sync: HackTricks Knowledge Base'
          body: |
            ## Auto-sync: HackTricks Knowledge Base

            Automated sync of HackTricks content to `knowledge_base/hacktricks/`.

            **Topics synced:**
            - `pentesting-web` → Web Application Pentesting
            - `network-services-pentesting` → Network Services
            - `windows-hardening` → Windows Security
            - `linux-hardening` → Linux Security
            - `cloud-security` → Cloud Security

            **Source**: https://github.com/HackTricks-wiki/hacktricks

            Please review changes and merge if the content looks correct.
          labels: 'auto-sync,knowledge-base,hacktricks'
